name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # ビルド/テスト用のダミー値（実際のシークレットは Vercel 側で管理）
  API_SECRET_KEY: dummy-api-secret-key
  DATABASE_URL: postgresql://dummy:dummy@localhost:26257/defaultdb?sslmode=verify-full
  NEXT_PUBLIC_ASKEN_MEMBER_ID: dummy-member-id
  NODE_VERSION: '22'
  NPM_VERSION: '11.6.1'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm install --global npm@${{ env.NPM_VERSION }}
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm install --global npm@${{ env.NPM_VERSION }}
      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm install --global npm@${{ env.NPM_VERSION }}
      - run: npm ci
      - run: npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm install --global npm@${{ env.NPM_VERSION }}
      - run: npm ci
      - run: npm run build
